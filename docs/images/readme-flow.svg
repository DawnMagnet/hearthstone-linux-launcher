<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">Migration from script workflow to desktop workflow</title>
  <desc id="desc">The original shell and Python workflow is replaced by a Rust GTK4 desktop application with packaged Linux releases.</desc>
  <rect width="1000" height="360" fill="#f7fafc"/>
  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="500" y="42" text-anchor="middle" fill="#17202a" font-size="28" font-weight="800">From script toolkit to desktop launcher</text>
    <g transform="translate(70 90)">
      <rect width="320" height="198" rx="14" fill="#fff" stroke="#d5dde5"/>
      <text x="160" y="36" text-anchor="middle" fill="#6b4e16" font-size="18" font-weight="800">Original hearthstone-linux</text>
      <rect x="34" y="64" width="252" height="34" rx="8" fill="#fff4d6"/>
      <text x="160" y="86" text-anchor="middle" fill="#553b09" font-size="14">craft.sh / manual terminal flow</text>
      <rect x="34" y="112" width="252" height="34" rx="8" fill="#fff4d6"/>
      <text x="160" y="134" text-anchor="middle" fill="#553b09" font-size="14">Python, Bash, git submodules</text>
      <rect x="34" y="160" width="252" height="34" rx="8" fill="#fff4d6"/>
      <text x="160" y="182" text-anchor="middle" fill="#553b09" font-size="14">User assembles environment</text>
    </g>
    <path d="M430 188 H570" stroke="#2f6f73" stroke-width="7" stroke-linecap="round"/>
    <path d="M570 188 L542 169 V207 Z" fill="#2f6f73"/>
    <text x="500" y="164" text-anchor="middle" fill="#2f6f73" font-size="15" font-weight="800">migrated and rebuilt</text>
    <g transform="translate(610 90)">
      <rect width="320" height="198" rx="14" fill="#fff" stroke="#d5dde5"/>
      <text x="160" y="36" text-anchor="middle" fill="#17494d" font-size="18" font-weight="800">Current GTK4 application</text>
      <rect x="34" y="64" width="252" height="34" rx="8" fill="#e0f2f0"/>
      <text x="160" y="86" text-anchor="middle" fill="#143c40" font-size="14">Install / Update button</text>
      <rect x="34" y="112" width="252" height="34" rx="8" fill="#e0f2f0"/>
      <text x="160" y="134" text-anchor="middle" fill="#143c40" font-size="14">Rust NGDP cache and verifier</text>
      <rect x="34" y="160" width="252" height="34" rx="8" fill="#e0f2f0"/>
      <text x="160" y="182" text-anchor="middle" fill="#143c40" font-size="14">AppImage, DEB, RPM, Nix</text>
    </g>
    <text x="500" y="326" text-anchor="middle" fill="#5d6d7e" font-size="15">Same compatibility idea, now packaged as a graphical Linux desktop app.</text>
  </g>
</svg>
