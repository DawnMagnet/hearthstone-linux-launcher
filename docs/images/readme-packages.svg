<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="330" viewBox="0 0 1000 330" role="img" aria-labelledby="title desc">
  <title id="title">Release package matrix</title>
  <desc id="desc">AppImage, DEB, RPM, and Nix packages are built from one Nix release pipeline.</desc>
  <rect width="1000" height="330" fill="#fbfcfd"/>
  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="500" y="42" text-anchor="middle" fill="#17202a" font-size="28" font-weight="800">One build pipeline, four Linux release formats</text>
    <g transform="translate(58 92)">
      <rect width="196" height="150" rx="14" fill="#e9f5f3" stroke="#b8d8d4"/>
      <circle cx="98" cy="50" r="26" fill="#2f6f73"/>
      <text x="98" y="59" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="900">A</text>
      <text x="98" y="95" text-anchor="middle" fill="#173d40" font-size="19" font-weight="800">AppImage</text>
      <text x="98" y="122" text-anchor="middle" fill="#42656a" font-size="13">Portable x86_64</text>
    </g>
    <g transform="translate(286 92)">
      <rect width="196" height="150" rx="14" fill="#fff1e8" stroke="#e3c6b4"/>
      <circle cx="98" cy="50" r="26" fill="#b94700"/>
      <text x="98" y="59" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="900">D</text>
      <text x="98" y="95" text-anchor="middle" fill="#5a2508" font-size="19" font-weight="800">DEB</text>
      <text x="98" y="122" text-anchor="middle" fill="#7c4f35" font-size="13">Debian / Ubuntu</text>
    </g>
    <g transform="translate(514 92)">
      <rect width="196" height="150" rx="14" fill="#eef3ff" stroke="#c6d4ef"/>
      <circle cx="98" cy="50" r="26" fill="#4a68a8"/>
      <text x="98" y="59" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="900">R</text>
      <text x="98" y="95" text-anchor="middle" fill="#1d356b" font-size="19" font-weight="800">RPM</text>
      <text x="98" y="122" text-anchor="middle" fill="#52658d" font-size="13">Fedora / RHEL</text>
    </g>
    <g transform="translate(742 92)">
      <rect width="196" height="150" rx="14" fill="#f0ecfb" stroke="#d2c7ef"/>
      <circle cx="98" cy="50" r="26" fill="#6750a4"/>
      <text x="98" y="59" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="900">N</text>
      <text x="98" y="95" text-anchor="middle" fill="#38236b" font-size="19" font-weight="800">Nix</text>
      <text x="98" y="122" text-anchor="middle" fill="#66558d" font-size="13">Native package</text>
    </g>
    <path d="M186 270 H814" stroke="#ccd6dd" stroke-width="8" stroke-linecap="round"/>
    <circle cx="500" cy="270" r="32" fill="#17202a"/>
    <text x="500" y="277" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="900">AllDist</text>
    <text x="500" y="310" text-anchor="middle" fill="#5d6d7e" font-size="14">Generated by the unified Nix release target from the same source tree.</text>
  </g>
</svg>
